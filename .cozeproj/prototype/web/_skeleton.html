<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niche Finder · 利基探测器</title>

  <!-- 字体：Space Grotesk（标题/数字）+ Inter（正文）+ JetBrains Mono（数据） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet">

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色：暖琥珀金（专业、可信、淘金感） === */
      --color-primary:              #FFB547;
      --color-primary-container:    #3D2D14;
      --color-on-primary:           #0B0F19;
      --color-on-primary-container: #FFB547;
      /* === 背景 / 表面：Midnight Console 低饱和深色调 === */
      --color-background:                 #0B0F19;
      --color-surface-container-lowest:   #080B14;
      --color-surface:                    #131826;
      --color-surface-container:          #1A2030;
      --color-surface-container-high:     #222B3F;
      --color-surface-container-highest:  #2A334A;
      /* === 文字 === */
      --color-on-surface:           #E6E9F2;
      --color-on-surface-variant:   #8A93A8;
      /* === 功能色 === */
      --color-success:  #4FD1C5;
      --color-error:    #FF6B6B;
      --color-warning:  #FFB547;
      --color-info:     #7FB8FF;
      /* === 4 种发现模式专属色 === */
      --color-mode-blue:    #4F8FFF;
      --color-mode-amber:   #FFB547;
      --color-mode-violet:  #B07AFF;
      --color-mode-mint:    #4FD1C5;
      /* === 边框 === */
      --color-outline:          #252B3B;
      --color-outline-variant:  #1A2030;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影（深色底需更高 opacity） === */
      --shadow-card:   0 1px 2px rgba(0,0,0,0.4), 0 4px 12px rgba(0,0,0,0.3);
      --shadow-float:  0 8px 16px rgba(0,0,0,0.5), 0 16px 32px rgba(0,0,0,0.4);
      --shadow-dialog: 0 20px 40px rgba(0,0,0,0.6), 0 30px 60px rgba(0,0,0,0.5);
      --shadow-glow:   0 0 0 1px rgba(255,181,71,0.2), 0 8px 24px rgba(255,181,71,0.15);
      /* === 字体 === */
      --font-sans:    "Inter", "Noto Sans SC", system-ui, sans-serif;
      --font-display: "Space Grotesk", "Inter", system-ui, sans-serif;
      --font-mono:    "JetBrains Mono", "SF Mono", Menlo, monospace;
    }
  </style>

  <style>
    /* 全局增强样式 */
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background-color: var(--color-background);
      color: var(--color-on-surface);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* 顶部细网格背景纹理（让深色不空旷） */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }
    .font-display { font-family: var(--font-display); letter-spacing: -0.02em; }
    .font-mono { font-family: var(--font-mono); }

    /* 主品牌渐变：暖金到浅金 */
    .gradient-amber {
      background: linear-gradient(135deg, #FFB547 0%, #FFD78A 50%, #FF9A2E 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    /* 模式专属色光晕 */
    .glow-blue   { box-shadow: 0 0 0 1px rgba(79,143,255,0.3), 0 8px 24px rgba(79,143,255,0.15); }
    .glow-amber  { box-shadow: 0 0 0 1px rgba(255,181,71,0.3), 0 8px 24px rgba(255,181,71,0.15); }
    .glow-violet { box-shadow: 0 0 0 1px rgba(176,122,255,0.3), 0 8px 24px rgba(176,122,255,0.15); }
    .glow-mint   { box-shadow: 0 0 0 1px rgba(79,209,197,0.3), 0 8px 24px rgba(79,209,197,0.15); }

    /* 顶部导航底纹：底部细分割线 */
    .header-divider {
      border-bottom: 1px solid var(--color-outline);
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23131826"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%238A93A8" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans relative">

  <!-- @nav:start 导航组件（所有 5 个页面统一使用此导航） -->
  <header class="sticky top-0 z-40 bg-background/80 backdrop-blur-xl header-divider">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between gap-6">
      <!-- Logo + 品牌名 -->
      <a href="home.html" class="flex items-center gap-2.5 group">
        <div class="w-8 h-8 rounded-md bg-gradient-to-br from-primary to-amber-300 flex items-center justify-center shadow-card">
          <i data-lucide="radar" class="w-4 h-4 text-on-primary"></i>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span class="font-display text-base font-bold text-on-surface tracking-tight">Niche Finder</span>
          <span class="text-[10px] font-mono text-on-surface-variant uppercase tracking-wider hidden sm:inline">v2.0</span>
        </div>
      </a>

      <!-- 中部导航 -->
      <nav class="hidden md:flex items-center gap-1">
        <a href="home.html" id="nav-home" class="px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">
          首页
        </a>
        <a href="opportunities.html" id="nav-opportunities" class="px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">
          我的机会
        </a>
        <a href="history.html" id="nav-history" class="px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">
          历史记录
        </a>
      </nav>

      <!-- 右侧：用户区域 -->
      <div class="flex items-center gap-3">
        <!-- 配额徽章 -->
        <div class="hidden sm:flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-surface-container border border-outline-variant/50 text-xs">
          <i data-lucide="zap" class="w-3 h-3 text-primary"></i>
          <span class="font-mono text-on-surface">3</span>
          <span class="text-on-surface-variant">/ 5 次</span>
        </div>
        <!-- 用户头像 -->
        <button id="btn-user-menu" class="flex items-center gap-2 pl-1 pr-2 py-1 rounded-md hover:bg-surface-container transition-colors">
          <div class="w-7 h-7 rounded-full bg-gradient-to-br from-primary to-mode-violet flex items-center justify-center text-on-primary text-xs font-bold">初</div>
        </button>
      </div>
    </div>
  </header>
  <!-- @nav:end 导航组件 -->

  <!-- @main-content:start -->
  <main class="max-w-7xl mx-auto px-6 py-10 relative">
    <!-- 页面内容由子 Agent 填充 -->
  </main>
  <!-- @main-content:end -->

  <script>lucide.createIcons();</script>
</body>

</html>
